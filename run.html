<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>챗봇 설정</title>
    <link rel="stylesheet" href="run.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🤖꾸덕이 YoBot</h1>
            <p>챗봇 서버 설정을 구성하고 실행하세요</p>
        </div>

        <!-- 중요 채널 ID 설정 -->
        <div class="config-section">
            <div class="important-section">
                <div class="important-title">채널 ID 설정 (필수)</div>
                <div class="channel-inputs">
                    <div class="channel-group">
                        <h3 class="channel-title"><img class="channel-icon" src="./src/client/assets/chat/icon/chzzk/icon_24.png" alt="치지직" style="width: 24px; height: 24px; margin-right: 8px;">치지직 (CHZZK)</h3>
                        <div class="form-group">
                            <input type="text" id="chzzkChannelId" value="dc7fb0d085cfbbe90e11836e3b85b784"
                                placeholder="채널 ID 입력">
                        </div>
                    </div>

                    <div class="channel-group">
                        <h3 class="channel-title"><img class="channel-icon" src="./src/client/assets/chat/icon/soop/icon_24.png" alt="숲" style="width: 24px; height: 24px; margin-right: 8px;">숲 (SOOP)</h3>
                        <div class="form-group">
                            <input type="text" id="soopBjId" value="" placeholder="BJ ID 입력">
                        </div>
                    </div>

                    <div class="channel-group">
                        <h3 class="channel-title"><img class="channel-icon" src="./src/client/assets/chat/icon/twitch/icon_24.png" alt="트위치" style="width: 24px; height: 24px; margin-right: 8px;">트위치 (TWITCH)</h3>
                        <div class="form-group">
                            <input type="text" id="twitchChannelId" placeholder="채널 ID 입력">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 상세 설정 -->
        <button id="detail-config-toggle-btn" onclick="toggleDetailConfig()">상세 설정 토글</button>
        <div id="detail-config" style="display: none;">
            <div class="config-section">
                <div class="section-title">🔧 기본 설정</div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="serverPort">서버 포트</label>
                        <input type="number" id="serverPort" value="13101" min="1000" max="65535">
                    </div>
                    <div class="form-group">
                        <label for="chatDisplayPort">채팅 디스플레이 포트</label>
                        <input type="number" id="chatDisplayPort" value="13102" min="1000" max="65535">
                    </div>
                </div>

                <div class="form-group">
                    <label for="maxMessages">최대 메시지 수</label>
                    <input type="number" id="maxMessages" value="200" min="1" max="1000">
                </div>
            </div>

            <div class="config-section">
                <div class="section-title">📺 치지직 (CHZZK) 상세 설정</div>

                <div class="platform-section">
                    <div class="platform-title">치지직 채널 정보</div>
                    <div class="form-group">
                        <label for="chzzkUrl">채널 URL</label>
                        <input type="text" id="chzzkUrl" value="wss://kr-ss1.chat.naver.com/chat" placeholder="채널 URL">
                    </div>
                    <div class="form-group">
                        <label for="chzzkWsUrl">WebSocket URL</label>
                        <input type="text" id="chzzkWsUrl" value="wss://kr-ss3.chat.naver.com/chat"
                            placeholder="WebSocket URL">
                    </div>
                </div>
            </div>

            <div class="config-section">
                <div class="section-title">🎮 숲 (SOOP) 상세 설정</div>

                <div class="platform-section">
                    <div class="platform-title">숲 BJ 정보</div>
                    <div class="form-group">
                        <label for="soopWsUrl">WebSocket URL</label>
                        <input type="text" id="soopWsUrl" value="wss://soop.live/chat" placeholder="WebSocket URL">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="soopPlayerApi">플레이어 API</label>
                            <input type="text" id="soopPlayerApi"
                                value="https://live.afreecatv.com/afreeca/player_live_api.php" placeholder="플레이어 API">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div class="button-group">
            <button class="btn btn-success" onclick="startChat()">🚀 시작</button>
        </div>
    </div>

    <script>
        function toggleDetailConfig() {
            const detail = document.getElementById('detail-config');
            console.log(detail.style.display);
            detail.style.display = detail.style.display === 'none' ? 'block' : 'none';
        }
        // 설정 파일 로드
        async function loadConfig() {
            try {
                showStatus('설정 파일을 불러오는 중...', 'info');

                const response = await fetch('./config.js');
                const configText = await response.text();

                // config.js 파일에서 값 파싱
                const configMatch = configText.match(/const config = ({[\s\S]*?});/);
                if (configMatch) {
                    const configStr = configMatch[1];
                    const config = eval('(' + configStr + ')');

                    // 폼에 값 채우기
                    document.getElementById('serverPort').value = config.PORT.SERVER;
                    document.getElementById('chatDisplayPort').value = config.PORT.CHAT_DISPLAY;
                    document.getElementById('maxMessages').value = config.MAX_MESSAGES;

                    document.getElementById('chzzkUrl').value = config.CHZZK.URL;
                    document.getElementById('chzzkWsUrl').value = config.CHZZK.WS_URL;
                    document.getElementById('chzzkChannelId').value = config.CHZZK.CHANNEL_ID;

                    document.getElementById('soopBjId').value = config.SOOP.CHANNEL_ID;
                    document.getElementById('soopWsUrl').value = config.SOOP.WS_URL;

                    document.getElementById('soopPlayerApi').value = config.SOOP.PLAYER_API_URL;

                    // 트위치 채널 ID (config에 없으면 빈 값)
                    if (config.TWITCH && config.TWITCH.CHANNEL_ID) {
                        document.getElementById('twitchChannelId').value = config.TWITCH.CHANNEL_ID;
                    }

                    showStatus('설정이 성공적으로 불러와졌습니다!', 'success');
                }
            } catch (error) {
                showStatus('설정 파일을 불러오는 데 실패했습니다: ' + error.message, 'error');
            }
        }

        // 설정 파일 저장
        async function saveConfig() {
            try {
                showStatus('설정을 저장하는 중...', 'info');

                // 기존 설정 불러오기
                const response = await fetch('./config.js');
                const configText = await response.text();
                const configMatch = configText.match(/const config = ({[\s\S]*?});/);

                if (!configMatch) {
                    throw new Error('기존 설정 파일을 읽을 수 없습니다.');
                }

                const existingConfig = eval('(' + configMatch[1] + ')');

                // 편집 가능한 필드만 업데이트
                const updatedConfig = {
                    ...existingConfig, // 기존 설정 유지

                    // 사용자 편집 가능 필드 업데이트
                    MAX_MESSAGES: parseInt(document.getElementById('maxMessages').value),
                    PORT: {
                        ...existingConfig.PORT, // SERVER, CHAT_DISPLAY 유지
                        SERVER: parseInt(document.getElementById('serverPort').value),
                        CHAT_DISPLAY: parseInt(document.getElementById('chatDisplayPort').value)
                    },
                    CHZZK: {
                        ...existingConfig.CHZZK, // 기존 CHZZK 설정 유지
                        CHANNEL_ID: document.getElementById('chzzkChannelId').value,
                        URL: document.getElementById('chzzkUrl').value,
                        WS_URL: document.getElementById('chzzkWsUrl').value
                    },
                    SOOP: {
                        ...existingConfig.SOOP, // 기존 SOOP 설정 유지
                        CHANNEL_ID: document.getElementById('soopBjId').value,
                        WS_URL: document.getElementById('soopWsUrl').value,
                        PLAYER_API_URL: document.getElementById('soopPlayerApi').value
                    },
                    TWITCH: {
                        ...existingConfig.TWITCH, // 기존 TWITCH 설정 유지
                        CHANNEL_ID: document.getElementById('twitchChannelId').value
                    }
                };

                // config.js 파일 내용 생성
                const configContent = `// config.js
const config = ${JSON.stringify(updatedConfig, null, 4)};
 
export default config;`;

                // 서버에 설정 저장 요청
                const saveResponse = await fetch('/save-config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ config: configContent })
                });

                if (saveResponse.ok) {
                    showStatus('설정이 성공적으로 저장되었습니다!', 'success');
                } else {
                    throw new Error('서버 응답 오류');
                }
            } catch (error) {
                showStatus('설정 저장에 실패했습니다: ' + error.message, 'error');
            }
        }

        async function startChat() {
            try {
                await saveConfig();
                showStatus('채팅 연결을 시작하는 중...', 'info');

                // 1. 채팅 시작 엔드포인트 호출
                const response = await fetch('/start-chat', {
                    method: 'POST'
                });

                if (response.ok) {
                    showStatus('채팅 연결이 시작되었습니다! 🚀', 'success');

                    // 2. 1초 후 index.html 호출
                    setTimeout(() => {
                        window.open('http://localhost:' + document.getElementById('serverPort').value, '_blank');
                        
                        // 3. 0.5초 후 run.html 창 닫기
                        setTimeout(() => {
                            window.close();
                        }, 500);
                    }, 1000);
                } else {
                    throw new Error('채팅 시작 실패');
                }
            } catch (error) {
                showStatus('채팅 시작에 실패했습니다: ' + error.message, 'error');
            }
        }

        // 상태 메시지 표시
        function showStatus(message, type) {
            const statusElement = document.getElementById('statusMessage');
            statusElement.textContent = message;
            statusElement.className = `status-message status-${type}`;
            statusElement.style.display = 'block';

            // 5초 후 메시지 숨김
            // setTimeout(() => {
            //     statusElement.style.display = 'none';
            // }, 5000);
        }


        // 페이지 로드 시 설정 자동 로드
        window.addEventListener('load', () => {
            loadConfig();
        });
    </script>
</body>

</html>
