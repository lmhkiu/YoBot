<!DOCTYPE html>
<html>
<head>
<style>
body {
    display: flex;
    flex-direction: row;
    height: 100vh;
    margin: 0;
}

#game-container {
    flex: 1;    /*부모 container에 영향을 받아 축소되고 확장됨. 즉 1 1 0px 의 축약.*/ 
    position: relative;
    display: none;
}

canvas {
    border: 1px solid black;
    display: none;
    /* 우선 채팅만 표시하기 위해 캔버스 숨김 */
}

/* 채팅 컨테이너 스타일 */
#chat-container {
    flex: 1 0 500px; /* 가로 크기 고정 0 크기가 늘어나도 채우지 않음, 두번째 0 지정된 크기 이하로 줄어도 container가 줄어들지 않음. */
   
    overflow-y: auto;
    background-color: #0e0e10; /* 다크 테마 배경 */
    color: #efeff1; /* 기본 텍스트 색상 */

    display: flex;
    flex-direction: column;
}

#chat-container h3 {
    /*부모에 대한 나의 반응*/
    flex: 0 0 auto;

    /*내 자식들에 대한 설정*/
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    
    /*나 자신에 대한 설정*/
    border:1px solid #efeff1;
    color: #efeff1;
    font-size: 14px;
    font-weight: 600;
    margin: 0;
}

#chat-messages {
    flex: 1;            /* 실제 채팅들이 쌓이는 영역, 즉 채팅 제목과 분리된 몸통 부분. 이부분은 h3과 column 으로 구분되므로 flex : 1 즉 부모의 크
    부모의 크기에 영향을 받아 함께 줄어들고 늘어남*/
    
    overflow-y: auto;   /* 당연히 채팅들이 많아질 때, 스크롤이 보여야 한다.*/

    display: flex;
    flex-direction: column;

    font-family: 'Roobert', 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    line-height: 1.4;

    align-items: stretch;   /* 자식들을 자신의 가로 너비에 맞춰 늘림. 즉 하나하나의 채팅 container이 chat-message의 가로 크기를
    chat-messages의 가로 크기에 맞춰 늘어남.*/

}

/* 채팅 메시지 스타일 */
.chat-message {

    /* 부모에 대한 나의 반응 */
    flex: 0 0 40px;

    /* 자식에 대한 설정 */
    display: flex; /* 메시지의 자식 요소들의 크기를 자신과 연관지어 설정시킨다. */
    flex-direction: row; /* chat-message는 아이디와 채팅 내용(이모티콘, 텍스트 혼합)이 가로로 행으로 정렬된다.
    이때 기본적으로 가장 왼쪽부터 아이디가 시작하므로 교차축 방향(세로)에 대해서 어떤 정렬을 할것인지를 align-items로 설정한다. 이때 */
    align-items: center; /* 메시지의 구성요소를 수직 정렬 */
    
    /* 나 자신에 대한 설정 */
    border: 1px solid #efeff1;
    margin-bottom: 8px; /* 채팅 사이의 간격을 조정 */
    
}

.chat-message-nickname-container{

    /* 부모에 대한 나의 반응 */
    flex: 0 0 auto; /*나는 부모의 영향 받지 않고 내부 컨텐츠에 따라 변화할 것이다. 아이디에 벳지들이 있을 수 있다.*/
    
    /* 나 자신의 설정 */
    margin-right: 6px; /* 아이디 오른쪽에 채팅 메시지들 이 올것이다. 그 사이에 간격을 주자.*/

    /* 자식에 대한 설정 */
    display: flex;  /* 자신은 닉네임과 실제아이디, 그리고 벳지들이 올 수 있으므로 여러개 존재한다. 따라서 이것 또한 가로 정렬.*/
    flex-direction: row;
    align-items: center;

}
.chat-message-badge{
    flex: 0 0 auto;
    object-fit: contain; /* 비율 유지하며 맞춤 */
}
.chat-message-nickname{
    flex: 0 0 auto;
    
    font-size: 14px;
    font-weight: bold;
    text-align: left;
    color: #ffffff;
}

.chat-message-content-container{
    flex: 1 1 auto; /* 채팅 내용이 가로로 길어질 수 있으므로 flex: 1 1 auto로 설정 */
    word-wrap: break-word; /* 긴 텍스트를 자동으로 줄바꿈 */

    display: flex;
    flex-direction: row;
    align-items: center;
}


</style>
</head>
<body>
    <div id="game-container">
        <canvas>

        </canvas>
    </div>
    
    <div id="chat-container">
        <h3>채팅 타이틀</h3>
        <div id="chat-messages">
            <div class="chat-message">
                <div class="chat-message-nickname-container">  
                    <img class="chat-message-badge" src="./assets/chat/icon/chzzk/icon_24.png" alt="chzzk">
                    <div class="chat-message-nickname">우유함유</div>
                </div>
                <div class="chat-message-content-container">
                    <div class="emote"></div>
                    <div class="chat-message-text">안녕하세요!</div>
                </div>
            </div>

            <div class="chat-message">
                <img class="emoticon" src="https://ogq-sticker-global-cdn-z01.sooplive.co.kr/sticker/6460cd0322470/9_80.webp" data-default-img="https://ogq-sticker-global-cdn-z01.sooplive.co.kr/sticker/6460cd0322470/9_80.webp?ver=1" data-static-img="https://ogq-sticker-global-cdn-z01.sooplive.co.kr/sticker/6460cd0322470/9_80.png?ver=1" alt="OGQ 이모티콘 이미지" onerror="this.onerror=null;this.src='https://res.sooplive.co.kr/images/chat/ogq_default.svg'">
            </div>
        </div>
    </div>
</body>
</html>
